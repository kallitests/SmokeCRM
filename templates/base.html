<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmokeCRM — {% block title %}Dashboard{% endblock %}</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f5f3;
      --surface: #ffffff;
      --surface-2: #f9f9f7;
      --border: rgba(0,0,0,0.08);
      --text: #1a1a18;
      --text-muted: #888880;
      --text-sm: 13px;
      --radius: 10px;
      --pass: #1D9E75;
      --fail: #E24B4A;
      --warn: #BA7517;
      --accent: #185FA5;
      --pass-bg: #E1F5EE;
      --fail-bg: #FCEBEB;
      --warn-bg: #FAEEDA;
      --accent-bg: #E6F1FB;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; display: flex; min-height: 100vh; }

    /* Sidebar */
    .sidebar { width: 210px; flex-shrink: 0; background: var(--surface); border-right: 0.5px solid var(--border); display: flex; flex-direction:column; position: sticky; top: 0; height: 100vh; }
    .logo { padding: 20px 16px 16px; border-bottom: 0.5px solid var(--border); }
    .logo-mark { display: flex; align-items: center; gap: 9px; margin-bottom: 3px; }
    .logo-icon { width: 26px; height: 26px; background: var(--text); border-radius: 7px; display: flex; align-items: center; justify-content: center; }
    .logo-icon svg { width: 14px; height: 14px; fill: white; }
    .logo-name { font-size: 15px; font-weight: 600; letter-spacing: -.01em; }
    .logo-sub { font-size: 11px; color: var(--text-muted); letter-spacing: .04em; text-transform: uppercase; }
    .nav { padding: 10px 8px; flex: 1; }
    .nav-item { display: flex; align-items: center; gap: 9px; padding: 8px 10px; border-radius: var(--radius); font-size: var(--text-sm); color: var(--text-muted); cursor: pointer; text-decoration: none; transition: background .12s, color .12s; margin-bottom: 2px; }
    .nav-item:hover { background: var(--surface-2); color: var(--text); }
    .nav-item.active { background: var(--bg); color: var(--text); font-weight: 500; }
    .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }
    .sidebar-footer { padding: 14px 16px; border-top: 0.5px solid var(--border); }
    .user-row { display: flex; align-items: center; gap: 9px; }
    .avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--accent-bg); color: var(--accent); font-size: 11px; font-weight: 600; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .user-name { font-size: 12px; font-weight: 500; }
    .user-email { font-size: 11px; color: var(--text-muted); }

    /* Main */
    .main { flex: 1; overflow: auto; }
    .topbar { display: flex; align-items: center; justify-content: space-between; padding: 14px 24px; background: var(--surface); border-bottom: 0.5px solid var(--border); position: sticky; top: 0; z-index: 10; }
    .page-title { font-size: 17px; font-weight: 600; letter-spacing: -.01em; }
    .topbar-right { display: flex; align-items: center; gap: 10px; }
    .env-badge { font-size: 11px; font-weight: 500; padding: 4px 10px; border-radius: 20px; background: var(--accent-bg); color: var(--accent); border: 0.5px solid #B5D4F4; }
    .btn-run { display: flex; align-items: center; gap: 6px; background: var(--text); color: white; border: none; padding: 7px 14px; border-radius: var(--radius); font-size: var(--text-sm); font-weight: 500; cursor: pointer; transition: opacity .15s; }
    .btn-run:hover { opacity: .85; }
    .btn-run:disabled { opacity: .5; cursor: not-allowed; }

    .content { padding: 24px; }

    /* Alert panel */
    .alert-panel { background: var(--fail-bg); border: 0.5px solid #F7C1C1; border-radius: 12px; padding: 16px; margin-bottom: 22px; }
    .alert-header { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
    .alert-title { font-size: var(--text-sm); font-weight: 500; color: #A32D2D; flex: 1; }
    .alert-item { background: var(--surface); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 8px; }
    .alert-item:last-child { margin-bottom: 0; }
    .alert-top { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .alert-endpoint { font-size: var(--text-sm); font-weight: 500; font-family: 'SF Mono', Consolas, monospace; }
    .alert-meta { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
    .ai-box { background: var(--accent-bg); border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; }
    .ai-label { font-size: 10px; font-weight: 600; color: var(--accent); letter-spacing: .06em; text-transform: uppercase; margin-bottom: 4px; }
    .ai-text { font-size: 12px; color: var(--text); line-height: 1.55; }
    .notif-row { display: flex; gap: 6px; }
    .notif-btn { display: flex; align-items: center; gap: 4px; font-size: 11px; padding: 4px 10px; border-radius: 20px; border: 0.5px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer; }
    .notif-btn.sent { color: var(--pass); border-color: #9FE1CB; background: var(--pass-bg); }

    /* KPIs */
    .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 22px; }
    .kpi { background: var(--surface); border: 0.5px solid var(--border); border-radius: 12px; padding: 16px 18px; }
    .kpi-label { font-size: 11px; color: var(--text-muted); letter-spacing: .05em; text-transform: uppercase; margin-bottom: 8px; }
    .kpi-value { font-size: 30px; font-weight: 600; letter-spacing: -.02em; color: var(--text); line-height: 1; }
    .kpi-sub { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

    /* Charts */
    .charts-row { display: grid; grid-template-columns: 1fr 260px; gap: 12px; margin-bottom: 22px; }
    .chart-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: 12px; padding: 18px; }
    .card-label { font-size: 11px; font-weight: 500; color: var(--text-muted); letter-spacing: .06em; text-transform: uppercase; margin-bottom: 16px; }
    .donut-center { display: flex; flex-direction: column; align-items: center; padding-top: 8px; }
    .legend { width: 100%; margin-top: 14px; display: flex; flex-direction: column; gap: 8px; }
    .legend-row { display: flex; align-items: center; justify-content: space-between; font-size: 12px; }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 7px; flex-shrink: 0; }

    /* Token stats */
    .token-bar { background: var(--surface); border: 0.5px solid var(--border); border-radius: 12px; padding: 16px 18px; margin-bottom: 22px; }
    .token-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 12px; }
    .token-cell { background: var(--surface-2); border-radius: var(--radius); padding: 10px 12px; }
    .token-val { font-size: 18px; font-weight: 600; color: var(--text); }
    .token-gain { font-size: 11px; color: var(--pass); margin-top: 2px; font-weight: 500; }

    /* Table */
    .table-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: 12px; overflow: hidden; }
    .table-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-bottom: 0.5px solid var(--border); }
    table { width: 100%; border-collapse: collapse; }
    th { font-size: 11px; color: var(--text-muted); font-weight: 500; text-align: left; padding: 10px 18px; border-bottom: 0.5px solid var(--border); letter-spacing: .03em; text-transform: uppercase; }
    td { font-size: var(--text-sm); color: var(--text); padding: 11px 18px; border-bottom: 0.5px solid var(--border); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface-2); }
    .mono { font-family: 'SF Mono', Consolas, monospace; font-size: 12px; }

    /* Badges */
    .badge { display: inline-flex; align-items: center; gap: 3px; font-size: 11px; font-weight: 500; padding: 3px 8px; border-radius: 20px; }
    .badge-pass { background: var(--pass-bg); color: #085041; }
    .badge-fail { background: var(--fail-bg); color: #A32D2D; }
    .badge-warn { background: var(--warn-bg); color: #633806; }
    .badge-crit { background: var(--fail-bg); color: #A32D2D; }
    .badge-high { background: var(--warn-bg); color: #633806; }
    .badge-med { background: var(--pass-bg); color: #085041; }
    .badge-get { background: var(--pass-bg); color: #085041; }
    .badge-post { background: var(--accent-bg); color: #0C447C; }
    .badge-put { background: var(--warn-bg); color: #633806; }
    .badge-del { background: var(--fail-bg); color: #A32D2D; }
    .jira-btn { font-size: 11px; padding: 3px 9px; border-radius: 20px; border: 0.5px solid #B5D4F4; background: var(--accent-bg); color: var(--accent); cursor: pointer; text-decoration: none; }
    .jira-btn:hover { background: #B5D4F4; }

    /* Flash messages */
    .flash { padding: 10px 16px; border-radius: var(--radius); margin-bottom: 16px; font-size: var(--text-sm); }
    .flash-success { background: var(--pass-bg); color: #085041; border: 0.5px solid #9FE1CB; }
    .flash-error { background: var(--fail-bg); color: #A32D2D; border: 0.5px solid #F7C1C1; }

    @media (max-width: 900px) {
      .kpi-grid { grid-template-columns: repeat(2,1fr); }
      .charts-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<nav class="sidebar">
  <div class="logo">
    <div class="logo-mark">
      <div class="logo-icon">
        <svg viewBox="0 0 16 16"><path d="M8 1L2 4v4c0 3.3 2.5 6.4 6 7 3.5-.6 6-3.7 6-7V4L8 1z"/></svg>
      </div>
      <span class="logo-name">SmokeCRM</span>
    </div>
    <div class="logo-sub">Playwright QA</div>
  </div>

  <div class="nav">
    <a href="/" class="nav-item {% if active == 'dashboard' %}active{% endif %}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Dashboard
    </a>
    <a href="/tests" class="nav-item {% if active == 'tests' %}active{% endif %}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v18m0 0h10a2 2 0 002-2V9M9 21H5a2 2 0 01-2-2V9m0 0h18"/></svg>
      Test cases
    </a>
    <a href="/runs" class="nav-item {% if active == 'runs' %}active{% endif %}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
      Historique
    </a>
    <a href="#" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
      Alertes
    </a>
    <a href="#" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      Rapports
    </a>
    <a href="#" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      Team
    </a>
  </div>

  <div class="sidebar-footer">
    <div class="user-row">
      <div class="avatar">AD</div>
      <div>
        <div class="user-name">Admin</div>
        <div class="user-email">admin@smokecrm.dev</div>
      </div>
    </div>
  </div>
</nav>

<div class="main">
  {% block content %}{% endblock %}
</div>

</body>
</html>
